server {
    listen 3020;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Force redirects to be path-relative (no scheme/host) so the client
    # stays on its original https scheme. Without this, nginx (which sees
    # the proxied request as http from Caddy) emits Location: http://...
    # which Google Play flags as "site doesn't support secure connection".
    absolute_redirect off;
    port_in_redirect  off;

    location = / {
        return 301 /uk/;
    }

    location /api/ {
        proxy_pass http://host.docker.internal:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /uk/ {
        try_files $uri $uri/ $uri/index.html /uk/index.html;
    }
    location /en/ {
        try_files $uri $uri/ $uri/index.html /en/index.html;
    }
    location / {
        try_files $uri $uri/ $uri/index.html /uk/index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|webp)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml text/xml application/xml;
}

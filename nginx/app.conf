server {
    listen 3005;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy — long timeout for AI document generation (8 sequential Claude calls)
    location /api/ {
        proxy_pass http://host.docker.internal:3100/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://host.docker.internal:3100/health;
    }

    # SPA fallback — всі маршрути → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кешування статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|mp4|webp)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}

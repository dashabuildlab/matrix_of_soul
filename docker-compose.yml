services:
  api:
    build: ./api
    network_mode: "host"
    env_file:
      - .env
    environment:
      PORT: "3100"
    restart: unless-stopped
    mem_limit: 384m
    memswap_limit: 384m

  seo-website:
    build: ./seo-website
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3005:80"
    # Bind-mount the Expo web build so /app/* on the SEO domain serves
    # the actual mobile app web bundle from /srv/apps/matrix-of-soul/dist/.
    # nginx.conf's `location /app/` aliases /usr/share/nginx/html/app/.
    # Without this mount /app/ returns 404 even though dist/ exists on disk.
    volumes:
      - ./dist:/usr/share/nginx/html/app:ro
    restart: unless-stopped

  landing:
    image: nginx:alpine
    ports:
      - "3015:3015"
    volumes:
      - ./website:/usr/share/nginx/html:ro
      - ./nginx/landing.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
